name: Upstream watch

on:
  schedule:
    - cron: "18 * * * *"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PHP_VERSION: "8.4"
  # Pinned upstream series (major.minor). Auto-rebuilds only fire for patch
  # bumps within this line, e.g. 1.8.219 -> 1.8.220. Bump this manually to
  # opt into a new series (e.g. 1.9); use workflow_dispatch on build.yml for
  # one-off out-of-series builds.
  SERIES: "1.8"

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
      packages: read
    steps:
      - uses: imjasonh/setup-crane@v0.4

      # Decide whether to rebuild by reading the published image's labels.
      # Triggers a rebuild when either:
      #   * the upstream FreeScout patch is newer than what's published, or
      #   * the base image (serversideup/php) digest has drifted from what
      #     the published image was built against (security updates land here).
      #
      # PHP minor is an implementation detail — a PHP_VERSION bump in this
      # workflow does NOT mass-rebuild existing releases. For a one-off
      # rebuild against a new PHP, dispatch build.yml directly.
      - name: Decide whether to rebuild
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          upstream=$(gh api repos/freescout-helpdesk/freescout/releases/latest --jq .tag_name)
          echo "upstream=${upstream}"

          # Strip leading 'v' if present, then take everything before the last dot.
          upstream_series="${upstream#v}"
          upstream_series="${upstream_series%.*}"
          if [ "${upstream_series}" != "${SERIES}" ]; then
            echo "upstream ${upstream} is outside pinned series ${SERIES}; skipping auto-rebuild"
            echo "rebuild=false" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          current_base=$(crane digest "serversideup/php:${PHP_VERSION}-fpm-nginx-alpine")
          echo "current base digest: ${current_base}"

          # Read labels off the mutable <upstream> tag. Absent → first build
          # of this version. Present → compare base.digest to detect drift.
          cfg=$(crane config "${REGISTRY}/${IMAGE_NAME}:${upstream}" 2>/dev/null || true)
          if [ -z "${cfg}" ]; then
            echo "no published :${upstream} tag; will trigger first build"
            echo "rebuild=true" >>"$GITHUB_OUTPUT"
            echo "reason=new-version" >>"$GITHUB_OUTPUT"
          else
            published_base=$(echo "${cfg}" | jq -r '.config.Labels["org.opencontainers.image.base.digest"] // empty')
            published_ver=$(echo "${cfg}" | jq -r '.config.Labels["org.opencontainers.image.version"] // empty')
            echo "published version label: ${published_ver}"
            echo "published base digest:   ${published_base}"
            if [ "${published_base}" = "${current_base}" ]; then
              echo "up to date (base digest matches); no rebuild"
              echo "rebuild=false" >>"$GITHUB_OUTPUT"
            else
              echo "base digest drift detected; will trigger rebuild"
              echo "rebuild=true" >>"$GITHUB_OUTPUT"
              echo "reason=base-drift" >>"$GITHUB_OUTPUT"
            fi
          fi

          echo "upstream=${upstream}" >>"$GITHUB_OUTPUT"
          echo "base_digest=${current_base}" >>"$GITHUB_OUTPUT"

      - name: Trigger build
        if: steps.check.outputs.rebuild == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run build.yml \
            -f freescout_version='${{ steps.check.outputs.upstream }}' \
            -f php_version='${{ env.PHP_VERSION }}' \
            -f base_digest='${{ steps.check.outputs.base_digest }}'
