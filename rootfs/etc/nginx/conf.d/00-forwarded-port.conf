# Normalize SERVER_PORT to the PUBLIC port when running behind a
# TLS-terminating reverse proxy. http-context map, paired with the
# SERVER_PORT override in /etc/nginx/fastcgi_params (also shipped by this
# image). Included via the base image's `include /etc/nginx/conf.d/*.conf`
# in nginx.conf.template's http {} block.
#
# Why this exists
# ---------------
# php-saml (OneLogin\Saml2\Utils) reconstructs the "current URL" used to
# validate the SAML Response Destination directly from $_SERVER — it does
# NOT use Laravel's APP_URL. The official FreeScout SAML module enables
# php-saml proxy mode, so Utils::getSelfPort() reads HTTP_X_FORWARDED_PORT
# if the proxy sent it, and otherwise FALLS BACK to $_SERVER['SERVER_PORT'].
#
# Caddy/PikaPods (and many other proxies) forward X-Forwarded-Proto and
# X-Forwarded-Host but NOT X-Forwarded-Port. With the port header missing,
# getSelfPort() falls back to nginx's internal listen port (8080), producing
# ACS URLs like https://host:8080/saml/.../acs and failing validation:
#   "The response was received at https://host:8080/... instead of
#    https://host/..."
#
# Fixing SERVER_PORT covers both paths: php-saml's fallback, and any other
# code that builds URLs from SERVER_PORT. Once it is 443, php-saml's
# getSelfProtocol() also resolves https via its `port == 443` check. When a
# proxy DOES send X-Forwarded-Port, getSelfPort() reads that header first, so
# deriving solely from the scheme here is sufficient and never overrides it.
#
# Derivation:
#   - X-Forwarded-Proto: https -> 443
#   - X-Forwarded-Proto: http  -> 80
#   - absent (direct / loopback healthcheck) -> $server_port, i.e. unchanged
#     (8080), so non-proxied access and the /login probe keep working.
map $http_x_forwarded_proto $forwarded_server_port {
    default $server_port;
    https   443;
    http    80;
}
