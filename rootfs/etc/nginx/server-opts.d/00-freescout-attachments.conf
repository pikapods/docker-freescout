# Pre-empt the sensitive-extension deny in server-opts.d/security.conf
# (base image: serversideup/php-nginx) for FreeScout's authenticated
# attachment route.
#
# security.conf denies any URL ending in .log/.sql/.conf/.bak/.ini/.sh/.swp
# etc. FreeScout streams user-uploaded attachments through Laravel
# (routes/open.php -> OpenController@downloadAttachment); the final URL
# segment is the sender's filename, so any of those extensions are legal.
# The controller validates the signed `token` query param.
#
# The regex below intentionally mirrors security.conf's suffix list rather
# than matching all of /storage/attachment/*: that narrow scope preserves
# the sibling hidden-file deny (`location ~ /\.(?!well-known)`) for paths
# like /storage/attachment/0/0/0/.env, which still 403 here. If upstream
# adds a new suffix to its deny list this file will need a matching update.
#
# nginx evaluates regex locations first-match-wins in source order. The
# `00-` prefix sorts this file before `security.conf` under the
# `include /etc/nginx/server-opts.d/*.conf;` glob in site-opts.d/http.conf.
location ~* ^/storage/attachment/.+(?:#.*#|\.(?:bak|conf|config|dist|inc|ini|log|sh|sql|sw[op])|~)$ {
    try_files /__freescout_attachment_route__ /index.php?$query_string;
}
