# Replaces /etc/nginx/server-opts.d/security.conf from the base image
# (serversideup/php-nginx); that file is removed in the Dockerfile so
# only this configuration applies under the `include server-opts.d/*.conf`
# glob in site-opts.d/http.conf. The `zz-` prefix keeps our rules sorted
# after performance.conf and remoteip.conf, matching where upstream
# security.conf used to sit.
#
# Differences from upstream:
#   - Carves /storage/attachment/* out of the sensitive-extension deny so
#     FreeScout's token-gated attachment route (routes/open.php ->
#     OpenController@downloadAttachment, behind the "open" middleware
#     group) can serve user-uploaded files whose original names end in
#     .log/.sql/.conf/etc. The controller gates access via the signed
#     `token` query param plus the attachment's public/legacy status.
#   - Drops `X-Frame-Options` (FreeScout sets its own frame protection
#     in application middleware).
#   - Drops `X-Content-Type-Options` (FreeScout's
#     app/Http/Middleware/ResponseHeaders.php sets it globally on app
#     responses; keeping it here would double the header on every PHP
#     response, since nginx `add_header` appends rather than replaces).
#   - Drops `Strict-Transport-Security` (SSL_MODE=off: TLS terminates at
#     the reverse proxy, which owns HSTS).
#
# Kept from upstream:
#   - Hidden-file deny (`location ~ /\.(?!well-known)`).
#   - Sensitive-extension deny for everything outside the attachment
#     carve-out.
#   - Referrer-Policy response header (not covered by FreeScout
#     middleware).
#
# Order matters: nginx regex locations are first-match-wins in source
# order, so the attachment carve-out must appear before the
# sensitive-extension deny.

add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# FreeScout's token-gated attachment route, allowed through even when
# the user-supplied filename ends in a normally-denied suffix.
location ~* ^/storage/attachment/.+(?:#.*#|\.(?:bak|conf|config|dist|inc|ini|log|sh|sql|sw[op])|~)$ {
    try_files /__freescout_attachment_route__ /index.php?$query_string;
}

# Hidden files / directories except /.well-known/ (RFC 8615).
location ~ /\.(?!well-known) {
    deny all;
}

# Common sensitive-extension files everywhere else.
location ~* (?:#.*#|\.(?:bak|conf|config|dist|inc|ini|log|sh|sql|sw[op])|~)$ {
    deny all;
}
