# FreeScout-specific nginx overrides.
# The serversideup/php-nginx default doc root is already /var/www/html/public,
# but we set it explicitly to insulate against future base-image changes.

root /var/www/html/public;

# FreeScout serves attachment uploads up to 30 MB by default. Match it here so
# nginx doesn't reject before php-fpm sees the request.
client_max_body_size 30m;
